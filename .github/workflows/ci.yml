name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'
          cache: true

      - name: Format check
        run: |
          gofmt -w .
          git diff --exit-code

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build -o ./bin/glyph ./cmd/glyph

      - name: Doctor
        run: ./bin/glyph doctor --format json

      - name: Example
        run: |
          go build -o ./examples/apps/hello/hello ./examples/apps/hello
          ./bin/glyph run examples/specs/hello.yml --format md
