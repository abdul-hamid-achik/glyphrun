name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.3'
          cache: true

      - name: Format check
        run: |
          gofmt -w .
          git diff --exit-code

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build -o ./bin/glyph ./cmd/glyph

      - name: Doctor
        run: ./bin/glyph doctor --format json

      - name: Version
        run: ./bin/glyph --version

      - name: Example
        run: |
          go build -o ./examples/apps/hello/hello ./examples/apps/hello
          ./bin/glyph run examples/specs/hello.yml --format md

      - name: Count example
        run: |
          chmod +x ./examples/apps/count_target/run.sh
          ./bin/glyph run examples/specs/count_cells.yml --format md

      - name: JUnit example
        run: |
          mkdir -p reports
          ./bin/glyph run examples/specs/junit_xml_demo.yml --junit reports/glyph.xml --format md

  # Windows validates the ConPTY backend specifically. The full suite assumes a
  # Unix shell and example binaries, so this job builds everything and runs the
  # pseudo-console smoke test rather than the whole gate.
  windows:
    name: Windows (ConPTY)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache: true

      - name: Build
        run: go build ./...

      - name: ConPTY backend test
        run: go test ./internal/ptyrunner/...
