version: '3'

vars:
  BIN: ./bin/glyph
  MAIN: ./cmd/glyph
  REPORTER_DIR: '{{.REPORTER_DIR | default "/tmp/glyphrun-examples"}}'

tasks:
  default:
    cmds:
      - task --list

  deps:
    cmds:
      - go mod tidy

  build:
    cmds:
      - mkdir -p bin
      - go build -o {{.BIN}} {{.MAIN}}

  install:
    desc: Build and install glyph globally to /opt/homebrew/bin
    cmds:
      - cmd: |
          VERSION=$(git describe --tags --always --dirty)
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%d)
          go build \
            -ldflags "-X github.com/abdul-hamid-achik/glyphrun/internal/version.Version=${VERSION}-dev \
                       -X github.com/abdul-hamid-achik/glyphrun/internal/version.Commit=${COMMIT} \
                       -X github.com/abdul-hamid-achik/glyphrun/internal/version.BuildDate=${DATE}" \
            -o /opt/homebrew/bin/glyph {{.MAIN}}
      - /opt/homebrew/bin/glyph --version

  run:
    deps: [build]
    cmds:
      - '{{.BIN}} run {{.CLI_ARGS}}'

  doctor:
    deps: [build]
    cmds:
      - '{{.BIN}} doctor --format md'

  test:
    cmds:
      - go test ./...

  lint:
    cmds:
      - go vet ./...

  fmt:
    cmds:
      - gofmt -w .

  verify:
    cmds:
      - task fmt
      - task lint
      - task test
      - task build
      - '{{.BIN}} doctor --format json'

  example:
    deps: [build]
    cmds:
      - go build -o ./examples/apps/hello/hello ./examples/apps/hello
      - '{{.BIN}} run examples/specs/hello.yml --format md'

  example:download:
    deps: [build]
    env:
      REPORTER_DIR: '{{.REPORTER_DIR}}'
    cmds:
      - go build -o ./examples/apps/reporter/reporter ./examples/apps/reporter
      - '{{.BIN}} run examples/specs/download_artifact.yml --format md'

  example:transform:
    deps: [build]
    env:
      REPORTER_DIR: '{{.REPORTER_DIR}}'
    cmds:
      - go build -o ./examples/apps/reporter/reporter ./examples/apps/reporter
      - '{{.BIN}} run examples/specs/transform_artifact.yml --format md'

  example:batch:
    deps: [build]
    env:
      REPORTER_DIR: '{{.REPORTER_DIR}}'
    cmds:
      - go build -o ./examples/apps/reporter/reporter ./examples/apps/reporter
      - '{{.BIN}} run examples/specs/batch_step.yml --format md'

  example:junit:
    deps: [build]
    cmds:
      - mkdir -p reports
      - '{{.BIN}} run examples/specs/junit_xml_demo.yml --junit reports/glyph.xml --format md'

  example:count:
    deps: [build]
    cmds:
      - chmod +x ./examples/apps/count_target/run.sh
      - '{{.BIN}} run examples/specs/count_cells.yml --format md'

  context:
    deps: [build]
    cmds:
      - '{{.BIN}} context latest --format md'

